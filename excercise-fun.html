<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gợi Ý Bài Tập Thể Dục 💪</title>
    <link rel="stylesheet" href="science-fun.css">
</head>

<body>
    <a href="batmi.html" class="back-home-btn" title="Quay lại">
        <span class="arrow-icon">←</span>
    </a>

    <div class="science-container">
        <header class="science-header">
            <div>
                <p class="science-kicker">Sức khỏe là vàng</p>
                <h1>💪 Gợi ý bài tập mỗi ngày</h1>
                <p class="science-subtitle">Danh sách các bài tập hỗ trợ sức khỏe và vóc dáng.</p>
            </div>
            <button class="btn-add-entry" id="openAddExBtn" type="button">+ Thêm bài tập</button>
        </header>

        <section class="science-stats" id="exerciseStats">
            <div class="stat-card">
                <span class="stat-label">Tổng bài tập</span>
                <strong class="stat-value" id="totalDaysValue">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Đang hiển thị</span>
                <strong class="stat-value" id="filteredDaysValue">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Cập nhật gần nhất</span>
                <strong class="stat-value stat-small" id="lastUpdatedValue">--</strong>
            </div>
        </section>

        <section class="science-controls">
            <input type="text" id="searchInput" class="science-search" placeholder="Tìm theo tên bài tập, nhóm cơ...">
            <select id="sortFilter" class="science-filter">
                <option value="newest">Mới nhất</option>
                <option value="oldest">Cũ nhất</option>
                <option value="name">Theo tên (A-Z)</option>
            </select>
        </section>

        <section class="science-main">
            <div class="science-list-panel">
                <div class="science-list" id="exerciseList"></div>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <span class="empty-icon">🤸</span>
                    <p>Chưa có bài tập nào. Hãy thêm bài mới!</p>
                </div>
            </div>

            <div class="science-detail" id="exerciseDetail">
                <div class="science-detail-empty">
                    <span class="empty-icon">🤸</span>
                    <p>Chọn một bài tập bên trái để xem hướng dẫn chi tiết.</p>
                </div>
            </div>
        </section>
    </div>
