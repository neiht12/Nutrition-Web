<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới Ăn Uống Thông Minh</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="sky">
        <div class="sun">☀️</div>
        <div class="cloud cloud-1">☁️</div>
        <div class="cloud cloud-2">☁️</div>
        <div class="cloud cloud-3">☁️</div>
        <div class="cloud cloud-4">☁️</div>
        <div class="cloud cloud-5">☁️</div>
    </div>

    <div class="world">
        <a href="dinhduong.html" class="island island-1">
            <span class="label">Đảo Dinh Dưỡng</span>
            <div class="island-body">
                <img src="images/dao_dinh_duong-removebg-preview.png" alt="Đảo Dinh Dưỡng" class="island-img">
            </div>
            <div class="water-shadow"></div>
        </a>

        <a href="thuthach.html" class="island island-2">
            <span class="label">Đảo Thử Thách</span>
            <div class="island-body">
                <img src="images/dao_thu_thach-removebg-preview.png" alt="Đảo Thử Thách" class="island-img">
            </div>
            <div class="water-shadow"></div>
        </a>

        <a href="batmi.html" class="island island-3">
            <span class="label">Đảo Bật Mí</span>
            <div class="island-body">
                <img src="images/dao_bat_mi-removebg-preview.png" alt="Đảo Bật Mí" class="island-img">
            </div>
            <div class="water-shadow"></div>
        </a>

        <a href="giaidap.html" class="island island-4">
            <span class="label">Đảo Giải Đáp</span>
            <div class="island-body">
                <img src="images/dao_giai_dap-removebg-preview.png" alt="Đảo Giải Đáp" class="island-img">
            </div>
            <div class="water-shadow"></div>
        </a>
    </div>

</body>

</html>
