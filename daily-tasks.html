<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử Thách Hàng Ngày</title>
    <link rel="stylesheet" href="daily-tasks.css">
</head>

<body>

    <!-- Dashboard Nhiệm vụ hàng ngày -->
    <div class="daily-tasks-container">
        <a href="thuthach.html" class="back-home-btn" title="Quay lại">
            <span class="arrow-icon">←</span>
        </a>

        <div class="tasks-header">
            <h2>🎯 Thử Thách Hôm Nay</h2>
            <div class="header-controls">
                <button class="btn-add-task" id="openModalBtn" title="Thêm thử thách mới">+ Thêm Thử Thách</button>
                <div class="streak-badge">
                    <span class="flame-icon">🔥</span>
                    <span class="streak-count">0</span>
                    <span class="streak-text">ngày</span>
                </div>
            </div>
        </div>

        <div class="tasks-grid">
            <!-- Task 1: Ăn táo -->
            <div class="task-card" data-task="apple">
                <div class="task-header">
                    <span class="task-emoji">🍎</span>
                    <span class="task-name">Ăn quả táo</span>
                </div>
                <div class="task-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span class="progress-text">0 / 1</span>
                </div>
                <div class="task-actions">
                    <button class="btn-decrease" aria-label="Giảm">−</button>
                    <button class="btn-increase" aria-label="Tăng">+</button>
                </div>
                <div class="task-status">Chưa hoàn thành</div>
            </div>

            <!-- Task 2: Uống nước -->
            <div class="task-card" data-task="water">
                <div class="task-header">
                    <span class="task-emoji">💧</span>
                    <span class="task-name">Uống đủ 5 cốc nước</span>
                </div>
                <div class="task-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span class="progress-text">0 / 5</span>
                </div>
                <div class="task-actions">
                    <button class="btn-decrease" aria-label="Giảm">−</button>
                    <button class="btn-increase" aria-label="Tăng">+</button>
                </div>
                <div class="task-status">Chưa hoàn thành</div>
            </div>

            <!-- Task 3: Tránh chiên rán -->
            <div class="task-card" data-task="fried">
                <div class="task-header">
                    <span class="task-emoji">🚫</span>
                    <span class="task-name">Nói không đồ chiên rán</span>
                </div>
                <div class="task-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span class="progress-text">Không vi phạm</span>
                </div>
                <div class="task-actions">
                    <button class="btn-toggle" aria-label="Đạt được">✓ Đạt được</button>
                </div>
                <div class="task-status">Chưa hoàn thành</div>
            </div>
        </div>

        <div class="daily-stats">
            <div class="stat-item">
                <span class="stat-label">Hoàn thành hôm nay:</span>
                <span class="stat-value">0 / 3</span>
            </div>
        </div>
    </div>

    <!-- Modal thêm thử thách mới -->
    <div class="modal" id="addTaskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✨ Tạo Thử Thách Mới</h3>
                <button class="btn-close" id="closeModalBtn">×</button>
            </div>
            <form id="addTaskForm">
                <div class="form-group">
                    <label for="taskName">Tên thử thách:</label>
                    <input type="text" id="taskName" placeholder="VD: Uống sữa" required>
                </div>

                <div class="form-group">
                    <label for="taskEmoji">Emoji:</label>
                    <input type="text" id="taskEmoji" placeholder="VD: 🥛" maxlength="2" required>
                </div>

                <div class="form-group">
                    <label for="taskType">Loại thử thách:</label>
                    <select id="taskType" required>
                        <option value="counter">Đếm lần (mục tiêu: số)</option>
                        <option value="toggle">Có/Không (kiểu on/off)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="taskTarget">Mục tiêu:</label>
                    <input type="number" id="taskTarget" min="1" value="1" required>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn-submit">Tạo Thử Thách</button>
                </div>
            </form>
        </div>
    </div>

    <script src="daily-tasks.js"></script>
</body>

</html>
