services:
  postgres:
    image: postgres:16
    container_name: teacher-web-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teacher_web
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teacher_web"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
